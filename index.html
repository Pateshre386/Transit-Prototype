<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transit Prototype - Final</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b1a30;
        }

        #map {
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }

        .leaflet-tile-pane {
            filter: sepia(100%) hue-rotate(200deg) saturate(350%) brightness(0.8) contrast(1.1);
        }

        /* UI Panels */
        .ui-box {
            position: absolute;
            right: 15px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            font-family: Arial, sans-serif;
            border: 1px solid #ddd;
        }

        /* Legend specific */
        .legend-box {
            top: 15px;
        }

        .legend-box h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #333;
        }

        .legend-box p {
            margin: 5px 0;
            font-size: 14px;
            color: #444;
        }

        /* Coordinate Tracker specific */
        #coord-box {
            position: absolute;
            bottom: 15px;
            left: 15px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            font-family: monospace;
            font-size: 16px;
            color: #333;
            border: 2px solid #0088ff;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="ui-box legend-box">
        <h3>Transit Prototype</h3>
        <p>🔴 <b>Red/Yellow:</b> High Lateness Areas</p>
        <p>🟠 <b>Orange Circles:</b> Proposed Hubs</p>
        <p>🔵 <b>Blue Marker:</b> McMaster University</p>
        <p>▬ <b style="color:#0088ff;">Solid Blue Line:</b> Current Slow Routes</p>
        <p>▬ <b style="color:#ff7800;">Solid Orange Line:</b> Fast Hub Express</p>
    </div>

    <div id="coord-box">Hover over map to get coords</div>

    <div id="map"></div>

            [43.2610, -79.8694, 0.3], [43.2460, -79.8694, 0.3], [43.2533, -79.8560, 0.3], [43.2533, -79.8830, 0.3],

            // === Route corridor lateness ===
            [43.2480, -79.8286, 0.5], [43.2513, -79.8384, 0.5], [43.2518, -79.8463, 0.5], [43.2528, -79.8543, 0.5],
            [43.2535, -79.8593, 0.5], [43.2544, -79.8621, 0.5], [43.2554, -79.8653, 0.4], [43.2563, -79.8678, 0.4],
            [43.2200, -79.8073, 0.5], [43.2254, -79.8050, 0.5], [43.2312, -79.8026, 0.4], [43.2361, -79.8223, 0.4],
            [43.2434, -79.8305, 0.5], [43.2461, -79.8406, 0.5], [43.2483, -79.8506, 0.4],
            [43.2381, -79.8006, 0.4], [43.2404, -79.8099, 0.4], [43.2425, -79.8197, 0.5], [43.2436, -79.8238, 0.4]
        ];

        L.heatLayer(latenessData, {
            radius: 40, blur: 35, minOpacity: 0.3, maxZoom: 12,
            gradient: { 0.0: 'blue', 0.4: 'cyan', 0.6: 'lime', 0.8: 'yellow', 1.0: 'red' }
        }).addTo(map);

        // ==========================================
        // DATA & LOGIC: CURRENT SLOW ROUTES
        // ==========================================
        const slowRoutes = [
            [ // Route 1: 1 King
                [43.2289, -79.7655], [43.2289, -79.7684], [43.2292, -79.7701], [43.2300, -79.7739], [43.2293, -79.7745], [43.2313, -79.7792], [43.2319, -79.7815], [43.2332, -79.7881], [43.2340, -79.7909], [43.2345, -79.7929], [43.2352, -79.7958], [43.2356, -79.7977], [43.2360, -79.7995], [43.2381, -79.8006], [43.2380, -79.7995], [43.2393, -79.8054], [43.2400, -79.8080], [43.2404, -79.8099], [43.2410, -79.8129], [43.2414, -79.8149], [43.2414, -79.8149], [43.2425, -79.8197], [43.2436, -79.8219], [43.2436, -79.8238], [43.2448, -79.8254], [43.2448, -79.8260], [43.2480, -79.8286], [43.2501, -79.8325], [43.2512, -79.8362], [43.2513, -79.8384], [43.2514, -79.8415], [43.2515, -79.8438], [43.2518, -79.8463], [43.2528, -79.8486], [43.2525, -79.8519], [43.2528, -79.8543], [43.2531, -79.8568], [43.2535, -79.8593], [43.2544, -79.8621], [43.2548, -79.8632], [43.2554, -79.8653], [43.2563, -79.8678], [43.2557, -79.8666], [43.2580, -79.8738], [43.2585, -79.8757], [43.2594, -79.8787], [43.2604, -79.8819], [43.2614, -79.8853], [43.2622, -79.8880], [43.2621, -79.8967], [43.2630, -79.9007], [43.2603, -79.9098], [43.2603, -79.9098], [43.2613, -79.9072], [43.2620, -79.9101], [43.2621, -79.9121], [43.2623, -79.9159], [43.2622, -79.9188], [43.2610, -79.9178], [43.2659, -79.9141], [43.2577, -79.9195], [43.2575, -79.9235], [43.2576, -79.9259], [43.2575, -79.9280], [43.2574, -79.9302], [43.2574, -79.9317], [43.2578, -79.9344], [43.2544, -79.9378], [43.2522, -79.9396], [43.2509, -79.9405], [43.2484, -79.9428], [43.2473, -79.9436], [43.2478, -79.9460], [43.2452, -79.9488]
            ],
            [ // Route 2: Ancaster
                [43.2274, -79.9447], [43.2264, -79.9484], [43.2257, -79.9528], [43.2248, -79.9594], [43.2239, -79.9628], [43.2266, -79.9633], [43.2293, -79.9641], [43.2297, -79.9707], [43.2310, -79.9741], [43.2282, -79.9756], [43.2261, -79.9768], [43.2240, -79.9781], [43.2255, -79.9764], [43.2204, -79.9834], [43.2178, -79.9873], [43.2178, -79.9873], [43.2178, -79.9873], [43.2153, -79.9911], [43.2131, -79.9945], [43.2108, -79.9981], [43.2098, -79.9995], [43.2098, -79.9995], [43.2141, -79.9937], [43.1988, -80.0121], [43.1988, -80.0128], [43.1968, -80.0121], [43.1976, -80.0138], [43.2027, -79.9763]
            ],
            [ // Route 3: University
                [43.2533, -79.8692], [43.2539, -79.8674], [43.2557, -79.8666], [43.2567, -79.8691], [43.2580, -79.8738], [43.2585, -79.8757], [43.2594, -79.8787], [43.2604, -79.8819], [43.2614, -79.8853], [43.2622, -79.8880], [43.2621, -79.8967], [43.2630, -79.9007], [43.2603, -79.9098], [43.2603, -79.9098], [43.2613, -79.9072], [43.2620, -79.9101], [43.2621, -79.9121], [43.2623, -79.9159], [43.2622, -79.9188], [43.2610, -79.9178], [43.2659, -79.9141]
            ],
            [ // Route 4: Delaware
                [43.2200, -79.8073], [43.2235, -79.8058], [43.2254, -79.8050], [43.2272, -79.8043], [43.2291, -79.8035], [43.2312, -79.8026], [43.2312, -79.8026], [43.2315, -79.8053], [43.2317, -79.8077], [43.2321, -79.8104], [43.2337, -79.8157], [43.2337, -79.8157], [43.2352, -79.8184], [43.2356, -79.8204], [43.2361, -79.8223], [43.2366, -79.8245], [43.2361, -79.8258], [43.2369, -79.8276], [43.2395, -79.8321], [43.2386, -79.8295], [43.2408, -79.8317], [43.2428, -79.8312], [43.2434, -79.8305], [43.2440, -79.8326], [43.2445, -79.8344], [43.2451, -79.8369], [43.2458, -79.8392], [43.2461, -79.8406], [43.2465, -79.8436], [43.2470, -79.8458], [43.2476, -79.8481], [43.2483, -79.8506], [43.2474, -79.8521], [43.2479, -79.8539], [43.2484, -79.8560], [43.2490, -79.8585], [43.2496, -79.8610], [43.2513, -79.8615], [43.2521, -79.8644], [43.2530, -79.8678], [43.2539, -79.8674], [43.2557, -79.8666], [43.2567, -79.8691], [43.2580, -79.8738], [43.2585, -79.8757], [43.2594, -79.8787], [43.2604, -79.8819], [43.2614, -79.8853], [43.2622, -79.8880], [43.2621, -79.8967], [43.2630, -79.9007], [43.2603, -79.9098], [43.2603, -79.9098], [43.2613, -79.9072], [43.2620, -79.9101], [43.2621, -79.9121], [43.2623, -79.9159], [43.2622, -79.9188], [43.2610, -79.9178], [43.2659, -79.9141]
            ]
        ];

        slowRoutes.forEach(route => {
            L.polyline(route, { color: '#0088ff', weight: 3, opacity: 0.8 }).addTo(map);
        });

        const slowMarkers = slowRoutes.map(route => {
            return L.circleMarker(route[0], { radius: 6, fillColor: "#0088ff", color: "#fff", weight: 2, opacity: 1, fillOpacity: 1 }).addTo(map);
        });

        function getStopDistances(routeCoords) {
            let dists = [0];
            let cumDist = 0;
            for (let i = 1; i < routeCoords.length; i++) {
                let p1 = turf.point([routeCoords[i - 1][1], routeCoords[i - 1][0]]);
                let p2 = turf.point([routeCoords[i][1], routeCoords[i][0]]);
                cumDist += turf.distance(p1, p2, { units: 'kilometers' });
                dists.push(cumDist);
            }
            return dists;
        }

        const slowBuses = slowRoutes.map((route, i) => {
            const flippedCoords = route.map(coord => [coord[1], coord[0]]);
            return {
                marker: slowMarkers[i],
                line: turf.lineString(flippedCoords),
                stopDists: getStopDistances(route),
                currentDist: 0,
                targetStopIdx: 1,
                isPaused: false
            };
        });

        // ==========================================
        // DATA & LOGIC: FAST HUB ROUTES
        // ==========================================
        const fastRoutes = [
            [43.2177, -79.8630], [43.2140, -79.8700], [43.2160, -79.9050], [43.2380, -79.9140], [43.2500, -79.9030], [43.2580, -79.9150], [43.2609, -79.9192]
        ], fastEastgate = [
            [43.2260, -79.7628], [43.2330, -79.7850], [43.2430, -79.8220], [43.2540, -79.8600], [43.2580, -79.8750], [43.2609, -79.9192]
        ], fastAncaster = [
            [43.2200, -79.9800], [43.2250, -79.9650], [43.2420, -79.9400], [43.2550, -79.9250], [43.2609, -79.9192]
        ], fastBurlington = [
            [43.3250, -79.8050], [43.3100, -79.8300], [43.2800, -79.8650], [43.2680, -79.8800], [43.2680, -79.9100], [43.2609, -79.9192]
        ], fastDowntown = [
            [43.2533, -79.8694], [43.2580, -79.8750], [43.2620, -79.8880], [43.2630, -79.9000], [43.2609, -79.9192]
        ];

        const fastRoutesArray = [fastRoutes, fastEastgate, fastAncaster, fastBurlington, fastDowntown];

        fastRoutesArray.forEach(route => {
            L.polyline(route, { color: '#ff7800', weight: 3, opacity: 0.8 }).addTo(map);
        });

        const fastMarkers = fastRoutesArray.map(route => {
            return L.circleMarker(route[0], { radius: 7, fillColor: "#ff7800", color: "#fff", weight: 2, opacity: 1, fillOpacity: 1 }).addTo(map);
        });

        const fastBuses = fastRoutesArray.map((route, i) => {
            const flippedCoords = route.map(coord => [coord[1], coord[0]]);
            const line = turf.lineString(flippedCoords);
            return {
                marker: fastMarkers[i],
                line: line,
                length: turf.length(line, { units: 'kilometers' }),
                currentDist: 0
            };
        });

        // ==========================================
        // ANIMATION LOOP
        // ==========================================
        const slowAnimationSpeed = 0.030;
        const fastAnimationSpeed = 0.030;

        function animateDots() {
            // Process Slow Buses
            slowBuses.forEach(bus => {
                if (bus.isPaused) return;

                bus.currentDist += slowAnimationSpeed;
                let targetDist = bus.stopDists[bus.targetStopIdx];

                if (bus.currentDist >= targetDist) {
                    bus.currentDist = targetDist;
                    bus.isPaused = true;
                    bus.targetStopIdx++;

                    if (bus.targetStopIdx >= bus.stopDists.length) {
                        setTimeout(() => { bus.currentDist = 0; bus.targetStopIdx = 1; bus.isPaused = false; }, 2000);
                    } else {
                        setTimeout(() => { bus.isPaused = false; }, 2000);
                    }
                }

                const currentPoint = turf.along(bus.line, bus.currentDist, { units: 'kilometers' });
                bus.marker.setLatLng([currentPoint.geometry.coordinates[1], currentPoint.geometry.coordinates[0]]);
            });

            // Process Fast Buses
            fastBuses.forEach(bus => {
                bus.currentDist += fastAnimationSpeed;
                if (bus.currentDist > bus.length) bus.currentDist = 0;

                const currentPoint = turf.along(bus.line, bus.currentDist, { units: 'kilometers' });
                bus.marker.setLatLng([currentPoint.geometry.coordinates[1], currentPoint.geometry.coordinates[0]]);
            });

            requestAnimationFrame(animateDots);
        }

        animateDots();

        // ==========================================
        // COORDINATE TRACKER
        // ==========================================
        const coordBox = document.getElementById('coord-box');

        map.on('mousemove', function (e) {
            const lat = e.latlng.lat.toFixed(4);
            const lng = e.latlng.lng.toFixed(4);
            coordBox.innerHTML = `[${lat}, ${lng}]<br><small style="color:#666; font-family:Arial;">Click map to copy</small>`;
        });

        map.on('click', function (e) {
            const lat = e.latlng.lat.toFixed(4);
            const lng = e.latlng.lng.toFixed(4);
            const coordString = `[${lat}, ${lng}],`;

            navigator.clipboard.writeText(coordString).then(() => {
                coordBox.innerHTML = `<span style="color: #00aa00; font-weight:bold;">Copied to clipboard!</span>`;
                coordBox.style.backgroundColor = "#e8ffe8";
                setTimeout(() => { coordBox.style.backgroundColor = "rgba(255, 255, 255, 0.95)"; }, 500);
            });
        });

    </script>
</body>

</html>
