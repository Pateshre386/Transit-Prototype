    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b1a30;
        }

        #map {
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }

        .leaflet-tile-pane {
            filter: sepia(100%) hue-rotate(200deg) saturate(350%) brightness(0.8) contrast(1.1);
        }

        /* UI Panels */
        .ui-box {
            position: absolute;
            right: 15px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            font-family: Arial, sans-serif;
            border: 1px solid #ddd;
        }

        /* Legend specific */
        .legend-box {
            top: 15px;
        }

        .legend-box h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #333;
        }

        .legend-box p {
            margin: 5px 0;
            font-size: 14px;
            color: #444;
        }

        /* NEW: Toggle Controls specific */
        .controls-box {
            top: 200px;
            /* Sits directly below the legend */
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toggle-btn {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background-color: #0b1a30;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: left;
        }

        .toggle-btn:hover {
            background-color: #1a3a60;
        }

        .toggle-btn.off {
            background-color: #cccccc;
            color: #666666;
            text-decoration: line-through;
        }

        /* Coordinate Tracker specific */
        #coord-box {
            position: absolute;
            bottom: 15px;
            left: 15px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            font-family: monospace;
            font-size: 16px;
            color: #333;
            border: 2px solid #0088ff;
            text-align: center;
        }
    </style>

            return L.circleMarker(route[0], { radius: 6, fillColor: "#0088ff", color: "#fff", weight: 2, opacity: 1, fillOpacity: 1 }).addTo(slowLayerGroup);
        });

        function getStopDistances(routeCoords) {
            let dists = [0];
            let cumDist = 0;
            for (let i = 1; i < routeCoords.length; i++) {
                let p1 = turf.point([routeCoords[i - 1][1], routeCoords[i - 1][0]]);
                let p2 = turf.point([routeCoords[i][1], routeCoords[i][0]]);
                cumDist += turf.distance(p1, p2, { units: 'kilometers' });
                dists.push(cumDist);
            }
            return dists;
        }

        const slowBuses = slowRoutes.map((route, i) => {
            const flippedCoords = route.map(coord => [coord[1], coord[0]]);
            return {
                marker: slowMarkers[i],
                line: turf.lineString(flippedCoords),
                stopDists: getStopDistances(route),
                currentDist: 0,
                targetStopIdx: 1,
                isPaused: false
            };
        });

        // ==========================================
        // DATA & LOGIC: FAST HUB ROUTES
        // ==========================================
     const fastRoutes = [
  [ // Lime Ridge Express (via LINC & 403 westbound)
    [43.2165, -79.8620], // Lime Ridge Mall (Upper Wentworth St)
    [43.2154, -79.8651], // Upper Wentworth / LINC on-ramp
    [43.2158, -79.8747], // LINC westbound (mid-span)
    [43.2203, -79.8851], // LINC / Upper James interchange
    [43.2252, -79.9155], // LINC / Upper Paradise interchange
    [43.2587, -79.9067], // Main St W opposite 403 ramp (off-ramp)
    [43.2577, -79.9223], // Main St W / Cootes Dr
    [43.2614, -79.9197], // McMaster University
  ],
  [ // Eastgate Express (via Queenston Rd → Main St E → King St W → Main St W)
    [43.2289, -79.7655], // Eastgate Terminal
    [43.2360, -79.7995], // Queenston Rd / Rosewood (becomes Main St)
    [43.2381, -79.8006], // Main St E / Strathearne
    [43.2425, -79.8197], // Main St E / Ottawa St
    [43.2436, -79.8238], // Main St E / Kensington
    [43.2567, -79.8691], // King St E / James St (downtown)
    [43.2622, -79.8880], // King St W / Dundurn
    [43.2587, -79.9067], // King St W → Main St W / 403 ramp
    [43.2577, -79.9223], // Main St W / Cootes Dr
    [43.2614, -79.9197], // McMaster University
  ],
  [ // Ancaster Express (via Wilson St → Hwy 403 eastbound → Main St W)
    [43.2200, -79.9800], // Ancaster Hub (Wilson St area)
    [43.2156, -79.9891], // Wilson St W / Fortino's (403 access point)
    [43.2083, -80.0148], // Hwy 403 eastbound on-ramp
    [43.2252, -79.9155], // 403 / Upper Paradise interchange
    [43.2587, -79.9067], // 403 off-ramp / Main St W
    [43.2577, -79.9223], // Main St W / Cootes Dr
    [43.2614, -79.9197], // McMaster University
  ],
  [ // Burlington Express (via QEW → 403 → Aberdeen Ave → King St W → Main St W)
    [43.3250, -79.8050], // Burlington Hub
    [43.2967, -79.8663], // Plains Rd W / 403 on-ramp Burlington
    [43.3110, -79.9163], // Hwy 403 / Hwy 6 interchange
    [43.2645, -79.8800], // 403 / York Blvd off-ramp Hamilton
    [43.2505, -79.8916], // Aberdeen Ave (403 local connector)
    [43.2622, -79.8880], // King St W / Dundurn
    [43.2587, -79.9067], // King St W → Main St W / 403 ramp
    [43.2577, -79.9223], // Main St W / Cootes Dr
    [43.2614, -79.9197], // McMaster University
  ],
  [ // Downtown Express (via King St W → Main St W)
    [43.2533, -79.8692], // Hamilton GO Centre (downtown hub)
    [43.2567, -79.8691], // King St / James St
    [43.2622, -79.8880], // King St W / Dundurn
    [43.2621, -79.8967], // King St W / Macklin
    [43.2587, -79.9067], // King St W / Main St W (403 ramp area)
    [43.2577, -79.9223], // Main St W / Cootes Dr
    [43.2614, -79.9197], // McMaster University
  ],
];

        const fastRoutesArray = [fastRoutes, fastEastgate, fastAncaster, fastBurlington, fastDowntown];

        fastRoutesArray.forEach(route => {
            L.polyline(route, { color: '#ff7800', weight: 3, opacity: 0.8 }).addTo(fastLayerGroup);
        });

        const fastMarkers = fastRoutesArray.map(route => {
            return L.circleMarker(route[0], { radius: 7, fillColor: "#ff7800", color: "#fff", weight: 2, opacity: 1, fillOpacity: 1 }).addTo(fastLayerGroup);
        });

        const fastBuses = fastRoutesArray.map((route, i) => {
            const flippedCoords = route.map(coord => [coord[1], coord[0]]);
            const line = turf.lineString(flippedCoords);
            return {
                marker: fastMarkers[i],
                line: line,
                length: turf.length(line, { units: 'kilometers' }),
                currentDist: 0
            };
        });

        // ==========================================
        // ANIMATION LOOP
        // ==========================================
        const slowAnimationSpeed = 0.030;
        const fastAnimationSpeed = 0.030;

        function animateDots() {
            // Process Slow Buses
            slowBuses.forEach(bus => {
                if (bus.isPaused) return;

                bus.currentDist += slowAnimationSpeed;
                let targetDist = bus.stopDists[bus.targetStopIdx];

                if (bus.currentDist >= targetDist) {
                    bus.currentDist = targetDist;
                    bus.isPaused = true;
                    bus.targetStopIdx++;

                    if (bus.targetStopIdx >= bus.stopDists.length) {
                        setTimeout(() => { bus.currentDist = 0; bus.targetStopIdx = 1; bus.isPaused = false; }, 2000);
                    } else {
                        setTimeout(() => { bus.isPaused = false; }, 2000);
                    }
                }

                const currentPoint = turf.along(bus.line, bus.currentDist, { units: 'kilometers' });
                bus.marker.setLatLng([currentPoint.geometry.coordinates[1], currentPoint.geometry.coordinates[0]]);
            });

            // Process Fast Buses
            fastBuses.forEach(bus => {
                bus.currentDist += fastAnimationSpeed;
                if (bus.currentDist > bus.length) bus.currentDist = 0;

                const currentPoint = turf.along(bus.line, bus.currentDist, { units: 'kilometers' });
                bus.marker.setLatLng([currentPoint.geometry.coordinates[1], currentPoint.geometry.coordinates[0]]);
            });

            requestAnimationFrame(animateDots);
        }

        animateDots();

        // ==========================================
        // UI TOGGLE LOGIC
        // ==========================================
        
        // NEW: Stop the map from stealing clicks from the buttons
        const controlsBox = document.querySelector('.controls-box');
        L.DomEvent.disableClickPropagation(controlsBox);

        document.getElementById('btn-heat').addEventListener('click', function () {
            if (map.hasLayer(heatLayer)) {
                map.removeLayer(heatLayer);
                this.classList.add('off');
            } else {
                map.addLayer(heatLayer);
                this.classList.remove('off');
            }
        });

        document.getElementById('btn-slow').addEventListener('click', function () {
            if (map.hasLayer(slowLayerGroup)) {
                map.removeLayer(slowLayerGroup);
                this.classList.add('off');
            } else {
                map.addLayer(slowLayerGroup);
                this.classList.remove('off');
            }
        });

        document.getElementById('btn-fast').addEventListener('click', function () {
            if (map.hasLayer(fastLayerGroup)) {
                map.removeLayer(fastLayerGroup);
                this.classList.add('off');
            } else {
                map.addLayer(fastLayerGroup);
                this.classList.remove('off');
            }
        });

        // ==========================================
        // COORDINATE TRACKER
        // ==========================================
        const coordBox = document.getElementById('coord-box');

        map.on('mousemove', function (e) {
            const lat = e.latlng.lat.toFixed(4);
            const lng = e.latlng.lng.toFixed(4);
            coordBox.innerHTML = `[${lat}, ${lng}]<br><small style="color:#666; font-family:Arial;">Click map to copy</small>`;
        });

        map.on('click', function (e) {
            const lat = e.latlng.lat.toFixed(4);
            const lng = e.latlng.lng.toFixed(4);
            const coordString = `[${lat}, ${lng}],`;

            navigator.clipboard.writeText(coordString).then(() => {
                coordBox.innerHTML = `<span style="color: #00aa00; font-weight:bold;">Copied to clipboard!</span>`;
                coordBox.style.backgroundColor = "#e8ffe8";
                setTimeout(() => { coordBox.style.backgroundColor = "rgba(255, 255, 255, 0.95)"; }, 500);
            });
        });

    </script>
</body>

</html>
